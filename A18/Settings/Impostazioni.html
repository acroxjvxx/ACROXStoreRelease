<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACROX - Impostazioni</title>
    
    <script src="../../JavaScript/Background/background.js"></script>
    <script src="../../JavaScript/Theme/themetheme.js"></script>
    <script src="../../wallpaper.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --accent-color: #9b59b6; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #eee;
            min-height: 100vh;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
        }

        .bg-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
            backdrop-filter: blur(5px);
        }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; background: rgba(0,0,0,0.9);
            height: 70px; position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        #logo { color: var(--accent-color) !important; font-size: 26px; font-weight: 800; text-decoration: none; cursor: pointer; }

        .wrapper { display: flex; margin-top: 70px; height: calc(100vh - 70px); }

        .sidebar {
            width: 260px; background: rgba(24, 25, 28, 0.9);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px 15px; display: flex; flex-direction: column; gap: 10px;
        }

        .nav-item { padding: 14px 18px; border-radius: 8px; cursor: pointer; transition: 0.2s; color: #888; font-weight: 600; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .nav-item.active { background: var(--accent-color) !important; color: #fff !important; }

        .content-area { flex: 1; padding: 40px; overflow-y: auto; }
        .section-panel { display: none; }
        .section-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .setting-card {
            background: rgba(24, 25, 28, 0.6); border-radius: 12px;
            padding: 30px; margin-bottom: 25px; border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .setting-card h2 { color: var(--accent-color) !important; margin-bottom: 20px; font-weight: 800; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Griglia Sfondi Dinamica */
        .bg-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .bg-option {
            aspect-ratio: 16/9;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            background-size: cover;
            background-position: center;
            transition: 0.3s;
            background-color: #1a1a1a;
        }

        .bg-option:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.5); }
        .bg-option.active { border-color: var(--accent-color); box-shadow: 0 0 15px var(--accent-color); }

        .btn { padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background: var(--accent-color) !important; color: #fff; transition: 0.3s; }
        .btn-danger { background: #ed4245 !important; }

        select { padding: 10px; background: #18191c; color: white; border: 1px solid #333; border-radius: 6px; outline: none; }
        input[type="color"] { -webkit-appearance: none; width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: none; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <h1 id="logo" onclick="window.location.href='../../index.html'">ACROX</h1>
        <div id="badge"></div>
    </header>

    <div class="wrapper">
        <nav class="sidebar">
            <div class="nav-item active" onclick="showSection('personalizzazione', this)" data-key="nav-aspect">Aspetto</div>
            <div class="nav-item" onclick="showSection('lingua', this)" data-key="nav-lang">Lingua</div>
            <div class="nav-item" onclick="showSection('profilo', this)" data-key="nav-profile">Profilo</div>
            <div class="nav-item" onclick="showSection('assistenza', this)" data-key="nav-help">Assistenza</div>
            <div class="nav-item" onclick="showSection('sistema', this)" data-key="nav-system">Sistema</div>
        </nav>

        <main class="content-area">
            
            <div id="personalizzazione" class="section-panel active">
                <div class="setting-card">
                    <h2 data-key="title-aspect">Aspetto</h2>
                    
                    <div class="setting-row">
                        <div>
                            <h3 data-key="label-color">Colore Launcher</h3>
                            <p style="color:#777; font-size:13px;" data-key="desc-color">Cambia il colore di bottoni e dettagli.</p>
                        </div>
                        <input type="color" id="accentPicker">
                    </div>

                    <div style="margin-top: 30px;">
                        <h3 data-key="label-bg">I tuoi Sfondi</h3>
                        <p style="color:#777; font-size:13px;" data-key="desc-bg">Sfondi memorizzati dal tuo profilo.</p>
                        <div class="bg-grid" id="bgGrid">
                            </div>
                    </div>
                </div>
            </div>

            <div id="lingua" class="section-panel">
                <div class="setting-card">
                    <h2 data-key="title-lang">Lingua</h2>
                    <div class="setting-row">
                        <div>
                            <h3 data-key="label-lang">Lingua del Launcher</h3>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <select id="languageSelect">
                                <option value="it">Italiano</option>
                                <option value="en">English</option>
                            </select>
                            <button class="btn" onclick="saveLanguage()" data-key="btn-save">Salva</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="profilo" class="section-panel">
                <div class="setting-card">
                    <h2 data-key="title-profile">Profilo Utente</h2>
                    <div class="setting-row">
                        <button class="btn" onclick="window.location.href='../../profile.html'" data-key="btn-open-profile">Gestisci Profilo</button>
                    </div>
                </div>
            </div>

            <div id="assistenza" class="section-panel">
                <div class="setting-card">
                    <h2 data-key="nav-help">Assistenza</h2>
                    <p style="text-align: center; padding: 20px; color: #bbb;" data-key="help-msg">Nel prossimo update ci sarà l'assistenza.</p>
                </div>
            </div>

            <div id="sistema" class="section-panel">
                <div class="setting-card" style="border-color: #ed4245;">
                    <h2 style="color: #ed4245 !important;" data-key="title-danger">Area Pericolosa</h2>
                    <button class="btn btn-danger" id="fullReset" data-key="btn-reset">Formatta Tutto</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        const dictionary = {
            it: {
                "nav-aspect": "Aspetto", "nav-lang": "Lingua", "nav-profile": "Profilo", "nav-system": "Sistema", "nav-help": "Assistenza",
                "title-aspect": "Aspetto", "label-color": "Colore Launcher", "desc-color": "Cambia il colore di bottoni e dettagli.",
                "label-bg": "I tuoi Sfondi", "desc-bg": "Sfondi memorizzati dal tuo profilo.",
                "title-lang": "Lingua", "btn-save": "Salva", "btn-open-profile": "Gestisci Profilo",
                "title-danger": "Area Pericolosa", "btn-reset": "Formatta Tutto", "help-msg": "Nel prossimo update ci sarà l'assistenza."
            },
            en: {
                "nav-aspect": "Appearance", "nav-lang": "Language", "nav-profile": "Profile", "nav-system": "System", "nav-help": "Support",
                "title-aspect": "Appearance", "label-color": "Launcher Color", "desc-color": "Change accents.",
                "label-bg": "Your Backgrounds", "desc-bg": "Wallpapers saved from your profile.",
                "title-lang": "Language", "btn-save": "Save", "btn-open-profile": "Manage Profile",
                "title-danger": "Danger Zone", "btn-reset": "Full Reset", "help-msg": "Customer support will be available in the next update."
            }
        };

        // --- GENERATORE GRIGLIA SFONDI ---
        function updateWallpaperGrid() {
            const grid = document.getElementById('bgGrid');
            if(!grid) return;
            grid.innerHTML = '';

            // Legge la lista salvata (deve essere un array JSON)
            let sfondi = JSON.parse(localStorage.getItem('acrox_wallpaper_list')) || [];
            const attuale = localStorage.getItem('userBg') || "";

            sfondi.forEach(url => {
                const item = document.createElement('div');
                item.className = 'bg-option';
                
                // Pulizia URL per sicurezza
                const cleanUrl = url.includes('url(') ? url : `url('${url}')`;
                item.style.backgroundImage = cleanUrl;

                if(cleanUrl === attuale) item.classList.add('active');

                item.onclick = () => {
                    localStorage.setItem('userBg', cleanUrl);
                    document.body.style.backgroundImage = cleanUrl;
                    document.querySelectorAll('.bg-option').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                };
                grid.appendChild(item);
            });
        }

        function applyLanguage() {
            const lang = localStorage.getItem('acrox_lang') || 'it';
            const dict = dictionary[lang];
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (dict[key]) el.innerText = dict[key];
            });
            document.getElementById('languageSelect').value = lang;
        }

        function saveLanguage() {
            localStorage.setItem('acrox_lang', document.getElementById('languageSelect').value);
            location.reload();
        }

        function applyColor(color) {
            document.documentElement.style.setProperty('--accent-color', color);
            localStorage.setItem('themeAccent', color);
            if(document.getElementById('logo')) document.getElementById('logo').style.color = color;
        }

        // Inizializzazione al caricamento
        window.addEventListener('DOMContentLoaded', () => {
            const savedColor = localStorage.getItem('themeAccent') || '#9b59b6';
            applyColor(savedColor);
            applyLanguage();
            updateWallpaperGrid();
            document.getElementById('accentPicker').value = savedColor;
        });

        function showSection(id, el) {
            document.querySelectorAll('.section-panel').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        document.getElementById('accentPicker').addEventListener('input', (e) => applyColor(e.target.value));

        document.getElementById('fullReset').onclick = () => {
            if(confirm("ATTENZIONE: Formattare tutto? Perderai sfondi e personalizzazioni.")) {
                localStorage.clear();
                window.location.href = '../../index.html';
            }
        };
    </script>
</body>
</html>
