<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>ACROX - Accedi</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
<script src="JavaScript/Theme/theme.js" defer></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; user-select: none; }
        
        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 40%, #a1c4fd 100%); 
            background-size: 200% 200%; animation: fluidGradient 10s ease infinite;
            overflow: hidden;
        }
        @keyframes fluidGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px; border-radius: 40px;
            box-shadow: 0 20px 40px rgba(107, 70, 193, 0.15);
            text-align: center; width: 360px; backdrop-filter: blur(15px);
            border: 4px solid rgba(255, 255, 255, 0.6);
            animation: slideUp 0.8s ease forwards;
        }

        h2 { font-size: 2rem; margin-bottom: 1.5rem; color: #3b3b58; }
        
        input { 
            width: 100%; padding: 1.1rem 1.4rem; margin-bottom: 1rem;
            border: 3px solid #e2e8f0; border-radius: 22px;
            background-color: rgba(247, 250, 252, 0.9);
            font-size: 1rem; outline: none; color: #4a4a6a;
        }

        .show-toggle {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.9rem; color: #6b6b83;
            margin-bottom: 1.5rem; cursor: pointer;
        }
        
        .show-toggle input[type="checkbox"] {
            width: 18px; height: 18px; cursor: pointer;
            accent-color: #805ad5;
        }

        button { 
            width: 100%; padding: 1.2rem; border: none; border-radius: 25px;
            background: linear-gradient(45deg, #805ad5, #9f7aea); color: white;
            font-size: 1.15rem; font-weight: 600; cursor: pointer;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(128, 90, 213, 0.3);
        }
        button:hover { transform: translateY(-3px) scale(1.02); }

        .error { color: #e53e3e; display: none; font-size: 0.9rem; margin-top: 1rem; font-weight: 600; }
        .version { margin-top: 1.5rem; font-size: 0.8rem; color: #a0aec0; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .fade-out { animation: fadeOut 0.5s ease forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

<div class="card" id="card">
    <h2>Bentornato!</h2>
    <input type="password" id="password" placeholder="Password...">
    
    <label class="show-toggle">
        <input type="checkbox" id="showPwd"> 
        <span>Mostra password</span>
    </label>

    <button id="pwdBtn">Accedi</button>
    <div id="error" class="error">Password errata, riprova!</div>
    <div id="version" class="version">Versione: ...</div>
</div>

<script>
    const { ipcRenderer } = require('electron');
    const fs = require('fs');
    const path = require('path');
    
    const pwdInput = document.getElementById('password');
    const pwdBtn = document.getElementById('pwdBtn');
    const error = document.getElementById('error');
    const show = document.getElementById('showPwd');
    const versionDiv = document.getElementById('version');
    const card = document.getElementById('card');

    const loginFile = path.join(__dirname, 'login.txt');
    let correctPassword = '';
    try {
        correctPassword = fs.readFileSync(loginFile, 'utf-8').trim();
    } catch(err) {
        alert('Errore: login.txt non trovato!');
    }

    show.addEventListener('change', () => {
        pwdInput.type = show.checked ? 'text' : 'password';
    });

    function tryLogin() {
        if(pwdInput.value === correctPassword){
            card.classList.add('fade-out');
            setTimeout(() => {
                ipcRenderer.send('maximize-window');
                ipcRenderer.send('open-home');
            }, 400);
        } else {
            error.style.display = 'block';
            pwdInput.value = '';
            pwdInput.focus();
        }
    }

    pwdBtn.addEventListener('click', tryLogin);
    pwdInput.addEventListener('keydown', e => { if(e.key === 'Enter') tryLogin(); });

    try {
        const packageJson = JSON.parse(fs.readFileSync(path.join(__dirname, 'package.json'), 'utf-8'));
        versionDiv.textContent = 'Versione: ' + packageJson.version;
    } catch {
        versionDiv.textContent = 'Versione non disponibile';
    }
</script>
</body>
</html>
