<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ACROX Dashboard</title>
    <script src="JavaScript/Theme/theme.js" defer></script>
    <script src="JavaScript/IntelligenzaArtificiale/IA.js" defer></script>
    <style>
        /* Sostituito con Inter per un look premium, moderno e coerente ovunque */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; user-select: none; }
        body { height: 100vh; display: flex; overflow: hidden; transition: background 0.5s ease; color: white; }

        /* Stile Scrollbar Personalizzata */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        /* Sidebar */
        nav { width: 280px; height: 100vh; background: rgba(0,0,0,0.15); backdrop-filter: blur(15px); display: flex; flex-direction: column; padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .nav-items { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        
        /* Struttura del pulsante di navigazione modernizzata ed elegante */
        .nav-icon { 
            width: 100%; 
            height: 46px; 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.01); 
            display: flex; 
            align-items: center; 
            padding: 0 16px; 
            cursor: pointer; 
            color: #949ba4; 
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); 
            font-size: 14px; 
            font-weight: 500; 
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .nav-icon img { 
            width: 18px; 
            height: 18px; 
            object-fit: contain; 
            filter: invert(0.65); 
            transition: all 0.2s ease;
        }
        .nav-icon:hover { 
            background: rgba(255, 255, 255, 0.06); 
            color: #f2f3f5;
            padding-left: 18px; 
            border-color: rgba(255, 255, 255, 0.06);
        }
        .nav-icon:hover img {
            filter: invert(0.9);
        }
        .nav-icon.active { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.11) 0%, rgba(255, 255, 255, 0.07) 100%); 
            color: white;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 4px 12px rgba(0, 0, 0, 0.15);
        }
        .nav-icon.active img {
            filter: invert(1);
        }

        /* Area Principale Modulare */
        .main-container { flex-grow: 1; height: 100vh; overflow-y: auto; padding: 40px; }

        /* Mini Player Musicale sopra il profilo */
        .mini-player-container { width: 100%; display: none; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.2); border-radius: 12px; padding: 10px; margin-bottom: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .player-info-block { display: flex; align-items: center; gap: 10px; flex-grow: 1; min-width: 0; }
        .player-mini-cover { width: 40px; height: 40px; border-radius: 6px; background-size: cover; background-position: center; flex-shrink: 0; cursor: pointer; transition: transform 0.2s ease; }
        .player-mini-cover:hover { transform: scale(1.05); }
        .player-text-block { display: flex; flex-direction: column; min-width: 0; }
        .player-mini-title { font-size: 13px; color: white; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .player-mini-status { font-size: 10px; font-weight: 600; opacity: 0.9; }

        /* Pannello Utente - Area Profilo Separata */
        .user-container { width: 100%; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; position: relative; }
        .profile-trigger { display: flex; align-items: center; gap: 10px; flex-grow: 1; min-width: 0; cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; }
        .profile-trigger:hover { background: rgba(255,255,255,0.1); }
        
        /* Avatar della barra laterale */
        .avatar { width: 40px; height: 40px; border-radius: 8px; background: #805ad5; flex-shrink: 0; background-position: center; background-size: cover; position: relative; }
        
        /* Allineamento nome */
        .user-text-wrapper { display: flex; align-items: center; gap: 8px; min-width: 0; flex-grow: 1; }
        .user-text { font-size: 14px; color: white; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Puntino di fianco al nome con bagliore personalizzato */
        .name-side-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; transition: background-color 0.2s ease, box-shadow 0.2s ease; display: inline-block; border: none; }

        /* Controlli isolati */
        .panel-controls { display: flex; gap: 4px; color: white; flex-shrink: 0; align-items: center; }
        .control-btn { cursor: pointer; padding: 6px; opacity: 0.8; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; position: relative; }
        .control-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }
        .control-btn img { width: 16px; height: 16px; object-fit: contain; filter: invert(1) brightness(2); }

        .control-btn.disattivato::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: linear-gradient(135deg, transparent 43%, #ff3b30 46%, #ff3b30 54%, transparent 57%);
            pointer-events: none;
            filter: drop-shadow(0px 1px 2px rgba(0, 0, 0, 0.4));
        }

        /* Popup Profilo */
        .profile-popup { display: none; position: absolute; bottom: 100px; left: 10px; width: 445px; height: 600px; background: #1e1f22; border-radius: 14px; padding: 0 0 15px 0; z-index: 1000; box-shadow: 0 12px 40px rgba(0,0,0,0.6); color: white; border: 1px solid #111112; overflow: hidden; transition: background 0.3s ease; flex-direction: column; }
        .popup-banner { height: 160px; background: #805ad5; transition: background 0.3s ease; width: 100%; position: relative; flex-shrink: 0; background-position: center center !important; background-size: cover !important; background-repeat: no-repeat !important; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
        
        /* Contenitore Avatar Popup */
        .popup-avatar { width: 95px; height: 95px; border-radius: 50%; border: 6px solid #1e1f22; position: absolute; top: 95px; left: 15px; background: #805ad5; background-position: center; background-size: cover; transition: border-color 0.3s ease; }
        
        /* Puntino foto profilo premium: piatto, netto e senza alcun bagliore o alone di luce */
        .popup-avatar-dot { position: absolute; bottom: 1px; right: 1px; width: 18px; height: 18px; border-radius: 50%; border: 3px solid #1e1f22; transition: background-color 0.2s ease; z-index: 10; box-shadow: none !important; }

        .popup-body { padding: 54px 16px 15px 16px; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; position: relative; }
        
        .name-container { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .popup-pronouns { font-size: 12px; background: rgba(255, 255, 255, 0.1); padding: 2px 6px; border-radius: 4px; color: #b5bac1; font-weight: 600; display: none; }

        .profile-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #b5bac1; letter-spacing: 0.5px; margin-bottom: 4px; }
        .profile-value { font-size: 14px; color: #dbdee1; word-wrap: break-word; white-space: pre-wrap; line-height: 1.4; max-height: 150px; overflow-y: auto; }
        .profile-value .bio-custom-emoji { width: 22px; height: 22px; object-fit: contain; vertical-align: bottom; display: inline-block; margin: 0 2px; }

        .test-clear-btn { align-self: flex-end; margin-top: auto; margin-bottom: 4px; padding: 6px 12px; background: #e67e22; color: white; border: none; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
        .test-clear-btn:hover { background: #d35400; }
        .popup-action-btn { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; background: rgba(255,255,255,0.06); color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .popup-action-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }

        .favorite-heart-btn.is-fav {
            color: #f43f5e !important;
            background: rgba(244, 63, 94, 0.15) !important;
            border-color: rgba(244, 63, 94, 0.3) !important;
            text-shadow: 0 0 8px rgba(244, 63, 94, 0.5);
        }
    </style>
</head>
<body>

    <nav>
        <style>
            .status-container {
                width: 100%;
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.35));
                border-radius: 12px;
                padding: 14px 16px;
                margin-bottom: 18px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                display: flex;
                flex-direction: column;
                gap: 6px;
                cursor: pointer;
                position: relative;
                transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                z-index: 1050;
            }
            .status-container:hover {
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.09), rgba(0, 0, 0, 0.45));
                border-color: rgba(255, 255, 255, 0.15);
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
            }
            .status-container:active {
                transform: translateY(0);
            }
            .status-text {
                font-size: 14px;
                font-weight: 700;
                color: #ffffff;
                display: flex;
                align-items: center;
                gap: 8px;
                letter-spacing: 0.3px;
            }
            
            /* Rimozione completa animazioni e bagliori dai puntini della selezione di rete */
            .status-dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                display: inline-block;
                position: relative;
                transition: background-color 0.2s ease;
                box-shadow: none !important;
            }
            .status-dot.online { background-color: #23a55a; }
            .status-dot.dnd { background-color: #f23f43; }
            .status-dot.idle { background-color: #f0b232; }
            .status-dot.offline { background-color: #80848e; }

            .ping-text {
                font-size: 12px;
                color: #b5bac1;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 5px;
                opacity: 0.95;
            }
            .status-arrow {
                margin-left: auto;
                font-size: 10px;
                color: #b5bac1;
                transition: transform 0.2s ease;
            }
            .status-container:hover .status-arrow {
                color: #ffffff;
            }

            .status-dropdown {
                display: none;
                position: absolute;
                top: calc(100% + 6px);
                left: 0;
                width: 100%;
                background: #111214;
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                z-index: 1060;
                overflow: hidden;
                padding: 6px;
                flex-direction: column;
                gap: 4px;
            }
            .status-dropdown.show { display: flex; }
            .status-option {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 12px;
                font-size: 13px;
                font-weight: 600;
                color: #dbdee1;
                border-radius: 8px;
                transition: background-color 0.2s, color 0.2s;
            }
            .status-option:hover {
                background-color: rgba(255, 255, 255, 0.06);
                color: #ffffff;
            }
            .status-option .option-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: none !important; }
        </style>

        <div class="nav-items">
            <div class="status-container" id="connection-status-box" onclick="toggleStatusDropdown(event)">
                <span class="status-text">
                    <span id="status-live-dot" class="status-dot online"></span>
                    <span id="connection-state">Online</span>
                    <span class="status-arrow">▼</span>
                </span>
                <span class="ping-text" id="connection-ping">
                    <img src="Images/signal.png" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 5px; filter: invert(1) brightness(2);"> Ping: Calcolo...
                </span>

                <div class="status-dropdown" id="status-selector-menu">
                    <div class="status-option" onclick="selectUserStatus('online', 'Online', event)">
                        <span class="option-dot" style="background-color: #23a55a;"></span> Online
                    </div>
                    <div class="status-option" onclick="selectUserStatus('dnd', 'Non disturbare', event)">
                        <span class="option-dot" style="background-color: #f23f43;"></span> Non disturbare
                    </div>
                    <div class="status-option" onclick="selectUserStatus('idle', 'Inattivo', event)">
                        <span class="option-dot" style="background-color: #f0b232;"></span> Inattivo
                    </div>
                </div>
            </div>

            <!-- Pulsanti di navigazione strutturati -->
            <div id="menu-home" class="nav-icon active" onclick="switchView('home', 'Files/Home/home.txt')">
                <img src="Images/home.png" alt="Home"> Home
            </div>
            <div id="menu-chat" class="nav-icon" onclick="switchView('chat', 'Files/Chat/chat.txt')">
                <img src="Images/chat.png" alt="Chat"> Chat
            </div>
            <div id="menu-games" class="nav-icon" onclick="switchView('games', 'Files/Games/games.txt')">
                <img src="Images/games.png" alt="Giochi"> Giochi
            </div>
            <div id="menu-rec" class="nav-icon" onclick="switchView('rec', 'Files/Rec/rec.txt')">
                <img src="Images/rec.png" alt="Aisos Rec"> Aisos Rec.
            </div>
        </div>

        <div class="mini-player-container" id="mini-player">
            <div class="player-info-block">
                <div class="player-mini-cover" id="mini-player-cover" onclick="apriMusicaSettings()" style="background-image: url('https://placehold.co/150x150/ffffff/000000?text=Audio');" title=""></div>
                <div class="player-text-block">
                    <span class="player-mini-title" id="mini-player-title">Nessun brano</span>
                    <span class="player-mini-status" id="mini-player-status">In pausa</span>
                </div>
            </div>
            <div class="panel-controls">
                <div class="control-btn" title="" id="mini-btn-prev">
                    <img src="Images/backward.png" alt="Back">
                </div>
                <div class="control-btn" title="" id="mini-btn-play">
                    <img id="mini-img-play" src="Images/play.png" alt="Play/Pause">
                </div>
                <div class="control-btn" title="" id="mini-btn-next">
                    <img src="Images/skip-button.png" alt="Skip">
                </div>
            </div>
        </div>

        <div class="user-container">
            <div class="profile-trigger" id="profile-trigger">
                <div class="avatar" id="avatar"></div>
                <div class="user-text-wrapper">
                    <div class="user-text" id="user-name">Acrox</div>
                    <span id="name-side-status-dot" class="name-side-dot" style="background-color: #23a55a;"></span>
                </div>
            </div>
            <div class="panel-controls">
                <div id="btn-mic" class="control-btn" title="" onclick="toggleMic()">
                    <img id="img-mic" src="Images/Microfone_On.png" alt="Microfono">
                </div>
                <div id="btn-headphones" class="control-btn" title="" onclick="toggleHeadphones()">
                    <img id="img-headphones" src="Images/Cuffie_On.png" alt="Cuffie">
                </div>
                <div class="control-btn" title="" onclick="window.location.href='profile.html'">
                    <img src="Images/Settings.png" alt="Impostazioni">
                </div>
            </div>
        </div>
    </nav>

    <div class="main-container" id="main-content-wrapper"></div>

    <div id="profile-popup" class="profile-popup">
        <div class="popup-banner" id="popup-banner">
            <div class="popup-avatar" id="popup-avatar">
                <span id="popup-profile-dot" class="popup-avatar-dot" style="background-color: #23a55a;"></span>
            </div>
        </div>
        <div class="popup-body">
            <div>
                <div class="name-container">
                    <h2 id="popup-username" style="font-size: 20px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px;">Acrox</h2>
                    <span id="popup-pronouns" class="popup-pronouns"></span>
                </div>
                <div id="popup-userid" style="font-size: 13px; color: #b5bac1; margin-top: 2px;">@acrox</div>
            </div>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 5px 0;">
            <div>
                <div class="profile-label">Biografia</div>
                <p id="popup-bio" class="profile-value">La mia bio personalizzata.</p>
            </div>
            <button class="test-clear-btn" onclick="eseguiWipeTest()">⚠️ Reset Cache (Wipe)</button>
            <button class="popup-action-btn" onclick="window.location.href='profilecustom.html'">Modifica profilo</button>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let isMicOn = localStorage.getItem('acrox_mic_on') !== 'false';
        let isHeadphonesOn = localStorage.getItem('acrox_headphones_on') !== 'false';

        let currentStatusType = localStorage.getItem('acrox_user_status_type') || 'online';
        let currentStatusLabel = localStorage.getItem('acrox_user_status_label') || 'Online';
        let isAppOffline = false; 

        function toggleStatusDropdown(event) {
            event.stopPropagation();
            const profilePopup = document.getElementById('profile-popup');
            if (profilePopup) profilePopup.style.display = 'none';
            
            const menu = document.getElementById('status-selector-menu');
            menu.classList.toggle('show');
        }

        function selectUserStatus(type, label, event) {
            if (event) event.stopPropagation();
            
            currentStatusType = type;
            currentStatusLabel = label;
            localStorage.setItem('acrox_user_status_type', type);
            localStorage.setItem('acrox_user_status_label', label);

            const dropdown = document.getElementById('status-selector-menu');
            dropdown.classList.remove('show');

            aggiornaGraficaStato();
        }

        function aggiornaGraficaStato() {
            const dot = document.getElementById('status-live-dot');
            const text = document.getElementById('connection-state');
            const sideDot = document.getElementById('name-side-status-dot');
            const popupAvatarDot = document.getElementById('popup-profile-dot');

            dot.className = "status-dot"; 

            let colorMap = {
                'online': '#23a55a',
                'dnd': '#f23f43',
                'idle': '#f0b232',
                'offline': '#80848e'
            };

            if (isAppOffline) {
                dot.classList.add('offline');
                text.textContent = "Disconnesso";
                if(sideDot) {
                    sideDot.style.backgroundColor = colorMap['offline'];
                    sideDot.style.boxShadow = `0 0 10px ${colorMap['offline']}`;
                }
                if(popupAvatarDot) popupAvatarDot.style.backgroundColor = colorMap['offline'];
            } else {
                dot.classList.add(currentStatusType);
                text.textContent = currentStatusLabel;
                
                if(sideDot) {
                    const statusColor = colorMap[currentStatusType] || '#23a55a';
                    sideDot.style.backgroundColor = statusColor;
                    sideDot.style.boxShadow = `0 0 10px ${statusColor}`;
                }

                if(popupAvatarDot) {
                    popupAvatarDot.style.backgroundColor = colorMap[currentStatusType] || '#23a55a';
                }
            }
        }

        ipcRenderer.on('update-network-status', (event, data) => {
            const pingText = document.getElementById('connection-ping');
            
            if (data.online) {
                isAppOffline = false;
                pingText.innerHTML = `<img src="Images/signal.png" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 5px; filter: invert(1) brightness(2);"> Ping: ${data.ping} ms`;
                
                if (data.ping < 60) pingText.style.color = '#23a55a';
                else if (data.ping < 130) pingText.style.color = '#f0b232';
                else pingText.style.color = '#f23f43';
            } else {
                isAppOffline = true;
                pingText.innerHTML = `❌ Nessuna rete`;
                pingText.style.color = '#80848e';
            }
            aggiornaGraficaStato();
        });

        function applicaStatoInizialeAudio() {
            const micImg = document.getElementById('img-mic');
            const micBtn = document.getElementById('btn-mic');
            const headphonesImg = document.getElementById('img-headphones');
            const headphonesBtn = document.getElementById('btn-headphones');

            if (micImg && micBtn) {
                if (isMicOn) {
                    micImg.src = 'Images/Microfone_On.png';
                    micBtn.classList.remove('disattivato');
                } else {
                    micImg.src = 'Images/Microfone_Off.png';
                    micBtn.classList.add('disattivato');
                }
            }

            if (headphonesImg && headphonesBtn) {
                if (isHeadphonesOn) {
                    headphonesImg.src = 'Images/Cuffie_On.png';
                    headphonesBtn.classList.remove('disattivato');
                } else {
                    headphonesImg.src = 'Images/Cuffie_Off.png';
                    headphonesBtn.classList.add('disattivato');
                }
            }
        }

        function toggleMic() {
            const micImg = document.getElementById('img-mic');
            const micBtn = document.getElementById('btn-mic');
            if (isMicOn) {
                micImg.src = 'Images/Microfone_Off.png';
                micBtn.classList.add('disattivato');
                localStorage.setItem('acrox_mic_on', 'false');
            } else {
                micImg.src = 'Images/Microfone_On.png';
                micBtn.classList.remove('disattivato');
                localStorage.setItem('acrox_mic_on', 'true');
            }
            isMicOn = !isMicOn;
        }

        function toggleHeadphones() {
            const headphonesImg = document.getElementById('img-headphones');
            const headphonesBtn = document.getElementById('btn-headphones');
            if (isHeadphonesOn) {
                headphonesImg.src = 'Images/Cuffie_Off.png';
                headphonesBtn.classList.add('disattivato');
                localStorage.setItem('acrox_headphones_on', 'false');
            } else {
                headphonesImg.src = 'Images/Cuffie_On.png';
                headphonesBtn.classList.remove('disattivato');
                localStorage.setItem('acrox_headphones_on', 'true');
            }
            isHeadphonesOn = !isHeadphonesOn;
        }

        // Funzione helper per iniettare il pulsante Edit ultra-compatto
        function injectAdminEditButton() {
            if (localStorage.getItem('isAdminAuthenticated') === 'true') {
                const categoryWrapper = document.querySelector('.category-dropdown-wrapper');
                if (categoryWrapper && !document.getElementById('admin-edit-btn')) {
                    const editBtn = document.createElement('button');
                    editBtn.id = 'admin-edit-btn';
                    
                    editBtn.className = 'category-trigger-btn';
                    
                    editBtn.style.maxWidth = '90px';
                    editBtn.style.justifyContent = 'center';
                    editBtn.style.flexShrink = '0';
                    editBtn.style.marginLeft = '8px';  
                    editBtn.style.display = 'inline-flex';
                    editBtn.style.alignItems = 'center';
                    editBtn.style.transition = 'all 0.2s ease';
                    
                    editBtn.innerHTML = '🖊️ Edit';
                    
                    editBtn.onmouseenter = () => {
                        editBtn.style.background = 'rgba(255, 255, 255, 0.06)';
                        editBtn.style.borderColor = 'rgba(255, 255, 255, 0.12)';
                        editBtn.style.color = '#ffffff';
                    };
                    editBtn.onmouseleave = () => {
                        editBtn.style.background = 'rgba(255, 255, 255, 0.02)';
                        editBtn.style.borderColor = 'rgba(255, 255, 255, 0.05)';
                        editBtn.style.color = '#e4e4e7';
                    };

                    editBtn.onclick = function(e) {
                        e.stopPropagation();
                        if(typeof openCmdModal === 'function') { openCmdModal(); } 
                        else { showTopPopup("🖊️ Modalità Modifica Attivata"); }
                    };
                    
                    categoryWrapper.appendChild(editBtn);
                }
            }
        }

        // FUNZIONE DI LETTURA NATIVA GIOCHI DAL JSON (Risolve il bug di lettura locale)
        function caricaGiochiDalDatabase() {
            try {
                const fs = window.require('fs');
                const path = window.require('path');
                
                // Cerca il file nella cartella principale del tuo progetto
                const percorsoJson = path.join(__dirname, 'giochi-salvati.json'); 

                if (fs.existsSync(percorsoJson)) {
                    const dataRaw = fs.readFileSync(percorsoJson, 'utf8');
                    const giochi = JSON.parse(dataRaw);
                    
                    popolaGrigliaGiochi(giochi); 
                } else {
                    console.error("Il file giochi-salvati.json non è stato trovato in: ", percorsoJson);
                }
            } catch (error) {
                console.error("Errore durante la lettura Node.js/Electron del JSON:", error);
            }
        }

        function popolaGrigliaGiochi(giochi) {
            const grid = document.getElementById('main-games-grid');
            if (!grid) return;
            
            grid.innerHTML = ''; 
            
            giochi.forEach(gioco => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.setAttribute('data-id', gioco.id);
                card.setAttribute('data-name', gioco.titolo);
                card.setAttribute('data-category', gioco.genere.toLowerCase());
                
                card.innerHTML = `
                    <img src="${gioco.immagine}" alt="${gioco.titolo}">
                    <h3>${gioco.titolo}</h3>
                    <p>${gioco.piattaforma} - ${gioco.genere}</p>
                    <button class="favorite-heart-btn" onclick="toggleFavorite('${gioco.id}', '${gioco.titolo}', event)">⭐</button>
                `;
                grid.appendChild(card);
            });

            analizzaPreferitiAlAvvio();
        }

        async function switchView(viewName, filePath) {
            const container = document.getElementById('main-content-wrapper');
            if (!container) return;

            try {
                const response = await fetch(filePath);
                if (response.ok) {
                    let htmlContent = await response.text();
                    container.innerHTML = htmlContent;

                    const scripts = container.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) {
                            newScript.src = oldScript.src;
                        } else {
                            newScript.textContent = oldScript.textContent;
                        }
                        document.body.appendChild(newScript).parentNode.removeChild(newScript);
                    });

                    if (viewName === 'games') {
                        // Quando entri nella vista dei giochi, carica i dati nativamente dal JSON
                        caricaGiochiDalDatabase();
                        injectAdminEditButton();
                    }

                } else {
                    container.innerHTML = `<p style="color:red; padding:20px;">Errore nel caricamento del modulo: ${response.statusText}</p>`;
                }
            } catch (error) {
                container.innerHTML = `<p style="color:red; padding:20px;">Errore di rete durante il caricamento di ${filePath}.</p>`;
            }

            const aiChatBox = document.getElementById('ai-chat-box');
            if (aiChatBox) {
                if (viewName === 'home' || viewName === 'chat') {
                    aiChatBox.style.setProperty('display', 'none', 'important');
                    aiChatBox.classList.remove('maximized');
                } else {
                    aiChatBox.style.removeProperty('display');
                    aiChatBox.style.display = 'none';
                }
            }

            document.querySelectorAll('.nav-icon').forEach(btn => btn.classList.remove('active'));
            const activeMenu = document.getElementById(`menu-${viewName}`);
            if (activeMenu) activeMenu.classList.add('active');
            
            localStorage.setItem('acrox_current_view', viewName);
            localStorage.setItem('acrox_current_view_path', filePath);
        }

        function apriMusicaSettings() { window.location.href = 'Settings.html?tab=musica'; }
        function eseguiWipeTest() { localStorage.clear(); window.location.href = 'Account.html'; }
        function escapeHTML(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

        function caricaDatiProfilo() {
            const globalUsername = localStorage.getItem('global_active_username') || "Acrox";
            const globalAvatar = localStorage.getItem('global_active_avatar') || "Images/acrox_profile.png";
            const globalBio = localStorage.getItem('global_active_bio') || "Nessuna biografia inserita.";
            const globalBanner = localStorage.getItem('global_active_banner') || "#805ad5";
            const defaultId = globalUsername.toLowerCase().replace(/\s+/g, '');
            const globalUserId = localStorage.getItem('global_active_userId') || defaultId;
            const globalPronouns = localStorage.getItem('global_active_pronouns') || "";
            const globalAisosBg = localStorage.getItem('global_aisos_bg');
            const savedC1 = localStorage.getItem('saved_mix_c1') || '#1e1f22';

            document.getElementById('user-name').textContent = globalUsername;
            document.getElementById('popup-username').textContent = globalUsername;
            document.getElementById('popup-userid').textContent = `@${globalUserId}`;
            
            let bioHTML = escapeHTML(globalBio);
            const emojiSalvate = JSON.parse(localStorage.getItem('acrox_emoji_list')) || [];
            emojiSalvate.forEach(emoji => {
                if (emoji.nome && emoji.src) {
                    const regex = new RegExp(emoji.nome.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'gi');
                    bioHTML = bioHTML.replace(regex, `<img src="${emoji.src}" class="bio-custom-emoji" alt="${emoji.nome}" title="${emoji.nome}">`);
                }
            });
            bioHTML = bioHTML.replace(/\n/g, '<br>');
            document.getElementById('popup-bio').innerHTML = bioHTML;
            
            const bannerEl = document.getElementById('popup-banner');
            if (globalBanner.startsWith('#') || globalBanner.startsWith('rgb') || globalBanner.startsWith('linear-gradient')) {
                bannerEl.style.background = globalBanner;
            } else {
                bannerEl.style.background = globalBanner.includes('url(') ? globalBanner : `url('${globalBanner}')`;
            }
            bannerEl.style.backgroundSize = "cover"; bannerEl.style.backgroundPosition = "center center"; bannerEl.style.backgroundRepeat = "no-repeat";

            const popupEl = document.getElementById('profile-popup');
            const popupAvatarEl = document.getElementById('popup-avatar');
            if (globalAisosBg) { popupEl.style.background = globalAisosBg; popupAvatarEl.style.borderColor = savedC1; } 
            else { popupEl.style.background = "#1e1f22"; popupAvatarEl.style.borderColor = "#1e1f22"; }

            const pronounsEl = document.getElementById('popup-pronouns');
            let haPronomi = false;
            if (globalPronouns.trim() !== "" && globalPronouns !== "Non specificati") { 
                pronounsEl.textContent = globalPronouns; 
                pronounsEl.style.display = "inline-block"; 
                haPronomi = true;
            } else { 
                pronounsEl.style.display = "none"; 
                pronounsEl.textContent = ""; 
            }

            const vecchioContainer = document.getElementById('profile-badges');
            if (vecchioContainer) vecchioContainer.remove();

            const haTikTok = localStorage.getItem('acrox_link_tiktok');
            const haYouTube = localStorage.getItem('acrox_link_youtube');

            if (haTikTok || haYouTube) {
                const badgesContainer = document.createElement('div');
                badgesContainer.id = 'profile-badges';
                badgesContainer.style.display = 'flex';
                badgesContainer.style.alignItems = 'center';
                badgesContainer.style.gap = '5px';
                badgesContainer.style.marginLeft = '2px';

                if (haTikTok) {
                    const tBadge = document.createElement('img');
                    tBadge.src = 'Images/tiktok_logo.png';
                    tBadge.style.width = '16px';
                    tBadge.style.height = '16px';
                    tBadge.style.borderRadius = '3px';
                    tBadge.title = 'Account TikTok collegato';
                    badgesContainer.appendChild(tBadge);
                }
                
                if (haYouTube) {
                    const yBadge = document.createElement('img');
                    yBadge.src = 'Images/youtube_logo.png';
                    yBadge.style.width = '16px';
                    yBadge.style.height = '16px';
                    yBadge.style.borderRadius = '3px';
                    yBadge.title = 'Canale YouTube collegato';
                    badgesContainer.appendChild(yBadge);
                }

                const nameContainer = document.querySelector('.name-container');
                if (nameContainer) {
                    if (haPronomi) {
                        pronounsEl.insertAdjacentElement('afterend', badgesContainer);
                    } else {
                        document.getElementById('popup-username').insertAdjacentElement('afterend', badgesContainer);
                    }
                }
            }

            document.getElementById('avatar').style.backgroundImage = `url('${globalAvatar}')`;
            popupAvatarEl.style.backgroundImage = `url('${globalAvatar}')`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('user_logged_in') !== 'true') { window.location.href = 'Account.html'; return; }
            caricaDatiProfilo();
            applicaStatoInizialeAudio();
            aggiornaGraficaStato();

            const lastView = localStorage.getItem('acrox_current_view') || 'home';
            const lastViewPath = localStorage.getItem('acrox_current_view_path') || 'Files/Home/home.txt';
            switchView(lastView, lastViewPath);

            const trigger = document.getElementById('profile-trigger');
            const popup = document.getElementById('profile-popup');

            trigger.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                document.getElementById('status-selector-menu').classList.remove('show');
                popup.style.display = popup.style.display === 'flex' ? 'none' : 'flex'; 
            });
            popup.addEventListener('click', (e) => { e.stopPropagation(); });
            
            window.addEventListener('click', () => { 
                popup.style.display = 'none'; 
                document.getElementById('status-selector-menu').classList.remove('show');
            });

            if (document.getElementById('mini-btn-play')) document.getElementById('mini-btn-play').onclick = () => ipcRenderer.send('music-command', { action: 'play-pause' });
            if (document.getElementById('mini-btn-prev')) document.getElementById('mini-btn-prev').onclick = () => ipcRenderer.send('music-command', { action: 'prev' });
            if (document.getElementById('mini-btn-next')) document.getElementById('mini-btn-next').onclick = () => ipcRenderer.send('music-command', { action: 'next' });

            ipcRenderer.send('music-command', { action: 'request-sync' });
        });

        window.addEventListener('storage', () => {
            caricaDatiProfilo();
        });

        ipcRenderer.on('sync-ui-status', (event, data) => {
            if (data.type === 'trackchange') {
                if (document.getElementById('mini-player')) document.getElementById('mini-player').style.display = 'flex';
                if (document.getElementById('mini-player-title')) document.getElementById('mini-player-title').innerText = data.title;
                if (document.getElementById('mini-player-cover')) document.getElementById('mini-player-cover').style.backgroundImage = `url('${data.coverSrc}')`;
                if (document.getElementById('mini-img-play')) document.getElementById('mini-img-play').src = data.paused ? 'Images/play.png' : 'Images/pause.png';
                if (document.getElementById('mini-player-status')) {
                    document.getElementById('mini-player-status').innerText = data.paused ? 'In pausa' : 'In riproduzione';
                    document.getElementById('mini-player-status').style.color = data.paused ? '#80848e' : '#23a55a';
                }
            }
        });

        let activeCategory = 'all';
        let filterOnlyFavorites = false;

        function analizzaPreferitiAlAvvio() {
            const savedFavorites = JSON.parse(localStorage.getItem('acrox_game_favorites')) || [];
            document.querySelectorAll('.game-card').forEach(card => {
                const gameId = card.getAttribute('data-id');
                const heartBtn = card.querySelector('.favorite-heart-btn');
                if (heartBtn) {
                    if (savedFavorites.includes(gameId)) {
                        heartBtn.classList.add('is-fav');
                    } else {
                        heartBtn.classList.remove('is-fav');
                    }
                }
            });
        }

        function goHome(event) {
            event.stopPropagation();
            
            filterOnlyFavorites = false;
            const favToggleBtn = document.getElementById('menu-fav-toggle');
            if (favToggleBtn) {
                favToggleBtn.classList.remove('active-filter');
                favToggleBtn.innerHTML = "⭐ Preferiti";
            }

            activeCategory = 'all';
            const triggerBtn = document.getElementById('category-trigger');
            if (triggerBtn) triggerBtn.innerHTML = `📂 Tutti i giochi <span class="arrow" id="category-arrow">▼</span>`;
            document.querySelectorAll('.category-item').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent === 'Tutti i giochi') btn.classList.add('active');
            });

            if(document.getElementById('game-search-input')) document.getElementById('game-search-input').value = '';

            chiudiSectionsMenu();
            filterGames();
            showTopPopup("🏠 Sei tornato alla Home");
        }

        function toggleFavorite(gameId, gameName, event) {
            event.stopPropagation();
            let savedFavorites = JSON.parse(localStorage.getItem('acrox_game_favorites')) || [];
            const heartBtn = event.currentTarget;
            let msg = "";

            if (savedFavorites.includes(gameId)) {
                savedFavorites = savedFavorites.filter(id => id !== gameId);
                heartBtn.classList.remove('is-fav');
                msg = `💔 Hai rimosso "${gameName}" dai preferiti`;
            } else {
                savedFavorites.push(gameId);
                heartBtn.classList.add('is-fav');
                msg = `💖 Hai aggiunto "${gameName}" ai preferiti`;
            }

            localStorage.setItem('acrox_game_favorites', JSON.stringify(savedFavorites));
            showTopPopup(msg);

            if (filterOnlyFavorites) {
                filterGames();
            }
        }

        UX_POPUP = showTopPopup;
        function showTopPopup(message) {
            const topToast = document.getElementById('top-toast');
            if(topToast) {
                topToast.innerHTML = message;
                topToast.classList.add('show');
                setTimeout(() => { topToast.classList.remove('show'); }, 2500);
            }
        }

        function toggleFavoritesFilter(event) {
            event.stopPropagation();
            filterOnlyFavorites = !filterOnlyFavorites;
            
            const favToggleBtn = document.getElementById('menu-fav-toggle');
            if (filterOnlyFavorites) {
                favToggleBtn.classList.add('active-filter');
                favToggleBtn.innerHTML = "⭐ Mostrando Preferiti";
            } else {
                favToggleBtn.classList.remove('active-filter');
                favToggleBtn.innerHTML = "⭐ Preferiti";
            }

            chiudiSectionsMenu();
            filterGames();
        }

        function toggleSectionsMenu(event) {
            event.stopPropagation();
            chiudiMenu(); 
            
            const menu = document.getElementById('sections-menu');
            const btn = document.getElementById('hamburger-btn');
            
            if (menu && menu.classList.contains('show')) {
                chiudiSectionsMenu();
            } else if(menu && btn) {
                btn.classList.add('active'); 
                menu.style.display = 'flex';
                setTimeout(() => { menu.classList.add('show'); }, 10);
            }
        }

        function chiudiSectionsMenu() {
            const menu = document.getElementById('sections-menu');
            const btn = document.getElementById('hamburger-btn');
            if (btn) btn.classList.remove('active'); 
            if (menu && menu.classList.contains('show')) {
                menu.classList.remove('show');
                setTimeout(() => { menu.style.display = 'none'; }, 180);
            }
        }

        function changeSection(sectionName, event) {
            event.stopPropagation();
            if (sectionName === 'admin') {
                chiudiSectionsMenu();
                openPasswordModal();
                return;
            }
            console.log("Navigazione su: " + sectionName);
            chiudiSectionsMenu();
        }

        function openPasswordModal() {
            const modal = document.getElementById('password-modal');
            const input = document.getElementById('admin-password-field');
            if(modal && input) {
                input.value = '';
                modal.style.display = 'flex';
                setTimeout(() => { modal.classList.add('show'); input.focus(); }, 10);
            }
        }

        function closePasswordModal() {
            const modal = document.getElementById('password-modal');
            if (modal) {
                modal.classList.remove('show');
                setTimeout(() => { modal.style.display = 'none'; }, 180);
            }
        }

        function verifyAdminPassword() {
            const passwordInput = document.getElementById('admin-password-field').value;
            if (passwordInput === "Acrox_CMD") {
                showTopPopup("✅ Accesso Amministratore Consentito!");
                localStorage.setItem('isAdminAuthenticated', 'true');
                closePasswordModal();
                injectAdminEditButton();
            } else {
                showTopPopup("❌ Password Errata. Accesso Negato.");
            }
        }

        function toggleCategoryMenu(event) {
            event.stopPropagation();
            chiudiSectionsMenu(); 
            
            const menu = document.getElementById('category-menu');
            const arrow = document.getElementById('category-arrow');
            
            if (menu && menu.classList.contains('show')) {
                chiudiMenu();
            } else if(menu) {
                menu.style.display = 'flex';
                setTimeout(() => {
                    menu.classList.add('show');
                    if (arrow) arrow.style.transform = 'rotate(180deg)';
                }, 10);
            }
        }

        function chiudiMenu() {
            const menu = document.getElementById('category-menu');
            const arrow = document.getElementById('category-arrow');
            if (menu && menu.classList.contains('show')) {
                menu.classList.remove('show');
                if (arrow) arrow.style.transform = 'rotate(0deg)';
                setTimeout(() => { menu.style.display = 'none'; }, 180);
            }
        }

        function filterCategory(category, buttonElement, categoryName) {
            activeCategory = category;
            document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            
            const triggerBtn = document.getElementById('category-trigger');
            if(triggerBtn) triggerBtn.innerHTML = `📂 ${categoryName} <span class="arrow" id="category-arrow">▼</span>`;
            
            chiudiMenu();
            filterGames();
        }

        function filterGames() {
            const searchInput = document.getElementById('game-search-input');
            const query = searchInput ? searchInput.value.toLowerCase() : '';
            const cards = document.querySelectorAll('.game-card');
            const savedFavorites = JSON.parse(localStorage.getItem('acrox_game_favorites')) || [];

            cards.forEach(card => {
                const gameName = card.getAttribute('data-name').toLowerCase();
                const gameId = card.getAttribute('data-id');
                const gameCategories = card.getAttribute('data-category') ? card.getAttribute('data-category').split(' ') : [];
                
                const matchesSearch = gameName.includes(query);
                const matchesCategory = (activeCategory === 'all' || gameCategories.includes(activeCategory));
                const matchesFavorites = !filterOnlyFavorites || savedFavorites.includes(gameId);

                if (matchesSearch && matchesCategory && matchesFavorites) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }

        function iaClickAction(event) {
            event.stopPropagation();
            if (typeof window.iaClickAction === 'function') {
                window.iaClickAction(event);
            } else if (window.parent && typeof window.parent.iaClickAction === 'function') {
                window.parent.iaClickAction(event);
            } else {
                console.log("IA Core non trovata nel file principale.");
            }
        }

        window.addEventListener('click', () => {
            chiudiMenu();
            chiudiSectionsMenu();
        });

        document.addEventListener('keydown', function(e) {
            if (e.target && e.target.id === 'admin-password-field' && e.key === 'Enter') {
                verifyAdminPassword();
            }
        });

        function tornaAGamesLista(event) {
            event.stopPropagation();
            if (typeof switchView === 'function') {
                switchView('games', 'Files/Games/games.txt');
            } 
            else if (window.parent && typeof window.parent.switchView === 'function') {
                window.parent.switchView('games', 'Files/Games/games.txt');
            } 
            else {
                const mainContent = document.getElementById('main-content-wrapper') || 
                                     (window.parent && window.parent.document.getElementById('main-content-wrapper')) || 
                                     document.body;
                
                const percorsoGames = 'Files/Games/games.txt'; 
                
                fetch(percorsoGames)
                    .then(res => {
                        if(!res.ok) throw new Error("File non trovato al percorso indicato");
                        return res.text();
                    })
                    .then(html => {
                        mainContent.innerHTML = html;
                        caricaGiochiDalDatabase();
                        injectAdminEditButton();
                    })
                    .catch(err => {
                        console.error("Errore nel caricamento di Games.txt:", err);
                        fetch('games.txt')
                            .then(res => res.text())
                            .then(html => { 
                                mainContent.innerHTML = html;
                                caricaGiochiDalDatabase();
                                injectAdminEditButton();
                            });
                    });
            }
        }
    </script>
