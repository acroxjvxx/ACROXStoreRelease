<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ACROX - Impostazioni Generali</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="JavaScript/Theme/theme.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; }
        body { height: 100vh; display: flex; overflow: hidden; color: white; transition: background 0.5s ease; }

        /* Stile Scrollbar Personalizzata e Sottile */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        * { scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.2) rgba(0, 0, 0, 0.05); }

        /* Sidebar */
        .sidebar { width: 300px; background: rgba(0,0,0,0.2); backdrop-filter: blur(15px); display: flex; flex-direction: column; padding: 40px 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        
        /* Riquadro Profilo Cliccabile */
        .profile-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 30px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .profile-card:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #ddd; object-fit: cover; }
        .profile-info h4 { font-size: 14px; }
        .profile-info p { font-size: 11px; opacity: 0.7; }

        .nav-header { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
        .nav-item { padding: 10px; cursor: pointer; border-radius: 8px; color: white; margin-bottom: 5px; background: rgba(255,255,255,0.05); transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: rgba(255,255,255,0.2) !important; }
        
        /* Contenuto */
        .content { flex-grow: 1; padding: 60px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        h1 { margin-bottom: 25px; }
        .card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 12px; margin-bottom: 30px; backdrop-filter: blur(5px); }

        p { line-height: 1.6; }

        .logout-container { margin-top: auto; padding-top: 20px; }
        .logout-btn { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .logout-btn:hover { background: rgba(240, 71, 71, 0.2); color: #ffb3b3; border-color: rgba(255,255,255,0.25); }

        /* Modale di Logout e Modifica */
        .custom-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 9999999 !important; }
        .modal-box { width: 420px; padding: 25px; border-radius: 18px; background: #2b2d31; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 50px rgba(0,0,0,.4); }
        .modal-box h2 { margin-bottom: 10px; color: white; }
        .modal-box p { color: rgba(255,255,255,.75); line-height: 1.5; font-size: 14px; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .cancel-btn, .confirm-btn { border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; transition: .2s; }
        .cancel-btn { background: rgba(255,255,255,.08); color: white; }
        .cancel-btn:hover { background: rgba(255,255,255,.15); }
        .confirm-btn { background: #ed4245; color: white; }
        .confirm-btn:hover { background: #d83a3a; }

        button { cursor: pointer !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-card" onclick="window.location.href='profilecustom.html'">
            <img id="sidebar-avatar" class="avatar" src="Images/acrox_profile.png">
            <div class="profile-info">
                <h4 id="sidebar-username">Nome Utente</h4>
                <p>Modifica Profilo</p>
            </div>
        </div>

        <div class="nav-header">IMPOSTAZIONI UTENTE</div>
        <div class="nav-item" onclick="window.location.href='profile.html'">← Torna Indietro</div>
       
        <div class="nav-header" style="margin-top:20px;">ALTRO</div>
        <div id="menu-musica" class="nav-item active" onclick="switchTab('musica', 'Files/Musica.txt')">Musica</div>

        <div class="logout-container">
            <button class="logout-btn" onclick="logout()">Disconnettiti</button>
        </div>
    </div>

    <div class="content">
        <div id="tab-musica" class="tab-content active">
            <h1>Musica</h1>
            <div class="card">
                <p style="opacity: 0.7;">Caricamento dei componenti multimediali in corso...</p>
            </div>
        </div>
    </div>

    <div id="logout-modal" class="custom-modal">
        <div class="modal-box">
            <h2>Esci dall'account</h2>
            <p>Vuoi davvero terminare la sessione corrente?</p>
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeLogoutModal()">Annulla</button>
                <button class="confirm-btn" onclick="confirmLogout()">Esci</button>
            </div>
        </div>
    </div>

    <script>
        // --- COLLEGAMENTO IPC CON INTERFACCIA ELECTRON ---
        const { ipcRenderer } = require('electron');

        // --- CONFIGURAZIONE INDEXEDDB PER SALVATAGGIO PERMANENTE ---
        const dbName = "AcroxMusicDB";
        const dbVersion = 1;
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, dbVersion);
                request.onerror = (e) => reject("Errore nell'apertura del database");
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onupgradeneeded = (e) => {
                    let database = e.target.result;
                    if (!database.objectStoreNames.contains("tracks")) {
                        database.createObjectStore("tracks", { keyPath: "id", autoIncrement: true });
                    }
                };
            });
        }

        function saveTrackToDB(track) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(["tracks"], "readwrite");
                const store = transaction.objectStore("tracks");
                const request = store.add(track);
                request.onsuccess = () => resolve();
                request.onerror = () => reject();
            });
        }

        function loadTracksFromDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(["tracks"], "readonly");
                const store = transaction.objectStore("tracks");
                const request = store.getAll();
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = () => reject();
            });
        }

        // --- STATO DEL PLAYER DELLA CODA LOCALE GRAFICA ---
        let playlist = [];
        const MAX_TRACKS = 10; // Limite massimo di brani consentiti
        let isSeeking = false; // Evita conflitti grafici durante il trascinamento della timeline
        let activeEditAction = ''; // Memorizza l'azione scelta nella modale: 'remove', 'name', 'cover'

        // Notifiche Custom stilizzate dentro la pagina
        function showMusicAlert(text, isError = false) {
            const alertBox = document.getElementById('music-alert');
            if (!alertBox) return;
            alertBox.innerText = text;
            alertBox.style.display = 'block';
            if (isError) {
                alertBox.style.background = 'rgba(237, 66, 69, 0.2)';
                alertBox.style.color = '#ffb3b3';
                alertBox.style.border = '1px solid rgba(237, 66, 69, 0.4)';
            } else {
                alertBox.style.background = 'rgba(87, 242, 135, 0.2)';
                alertBox.style.color = '#b3ffcc';
                alertBox.style.border = '1px solid rgba(87, 242, 135, 0.4)';
            }
            setTimeout(() => { if (alertBox) alertBox.style.display = 'none'; }, 4000);
        }

        // Inizializza i listener per gli elementi inseriti da Musica.txt collegandoli via IPC al background
        function initMusicListeners() {
            const addBtn = document.getElementById('add-track-btn');
            if (addBtn) {
                addBtn.onclick = async function() {
                    const titleInput = document.getElementById('track-title');
                    const fileInput = document.getElementById('track-file');
                    const coverInput = document.getElementById('track-cover');

                    const trackName = titleInput.value.trim();
                    const mp3File = fileInput.files[0];
                    const coverFile = coverInput.files[0];

                    if (!trackName || !mp3File) {
                        showMusicAlert("Inserisci un titolo e seleziona un file MP3!", true);
                        return;
                    }

                    if (!mp3File.name.toLowerCase().endsWith('.mp3')) {
                        showMusicAlert("Il file audio deve essere rigorosamente un .mp3!", true);
                        return;
                    }

                    if (coverFile) {
                        const validExtensions = ['.png', '.jpg', '.jpeg'];
                        const nameLower = coverFile.name.toLowerCase();
                        const isValid = validExtensions.some(ext => nameLower.endsWith(ext));
                        if (!isValid) {
                            showMusicAlert("La copertina deve essere in formato .png, .jpg o .jpeg!", true);
                            return;
                        }
                    }

                    // CONTROLLO DEL LIMITE MASSIMO DI 10 BRANI
                    if (playlist.length >= MAX_TRACKS) {
                        showMusicAlert(`Limite raggiunto! Non puoi aggiungere più di ${MAX_TRACKS} brani alla libreria.`, true);
                        return;
                    }

                    const newTrack = {
                        title: trackName,
                        audioBlob: mp3File,
                        coverBlob: coverFile || null
                    };

                    try {
                        await saveTrackToDB(newTrack);
                        showMusicAlert(`Brano aggiunto alla libreria! (${playlist.length + 1}/${MAX_TRACKS})`);
                        titleInput.value = '';
                        fileInput.value = '';
                        coverInput.value = '';
                        const audioLabel = document.getElementById('mp3-file-name');
                        const coverLabel = document.getElementById('cover-file-name');
                        if (audioLabel) audioLabel.innerText = 'Scegli o trascina un file audio...';
                        if (coverLabel) coverLabel.innerText = 'Scegli una copertina opzionale...';
                        
                        // Chiede alla finestra nascosta di aggiornare la sua playlist interna con il nuovo brano
                        ipcRenderer.send('music-command', { action: 'reload-db' });
                        await refreshPlaylistData();
                    } catch (err) {
                        showMusicAlert("Errore nel salvataggio del brano.", true);
                    }
                };
            }

            // CONTROLLI UTENTE INTERFACCIA -> IPC MAIN -> BACKGROUND AUDIO
            const playPauseBtn = document.getElementById('btn-play-pause');
            if (playPauseBtn) {
                playPauseBtn.onclick = function() {
                    ipcRenderer.send('music-command', { action: 'play-pause' });
                };
            }

            const nextBtn = document.getElementById('btn-next');
            if (nextBtn) {
                nextBtn.onclick = function() {
                    ipcRenderer.send('music-command', { action: 'next' });
                };
            }

            const prevBtn = document.getElementById('btn-prev');
            if (prevBtn) {
                prevBtn.onclick = function() {
                    ipcRenderer.send('music-command', { action: 'prev' });
                };
            }

            // Regolazione Volume con ripristino e salvataggio dello stato permanente
            const volumeControl = document.getElementById('volume-control');
            if (volumeControl) {
                // 🔴 CORRETTO: Ora usa la chiave universale 'saved_music_volume'
                const savedVolume = localStorage.getItem('saved_music_volume');
                if (savedVolume !== null) {
                    volumeControl.value = savedVolume;
                    ipcRenderer.send('music-command', { action: 'volume', value: parseFloat(savedVolume) });
                    updateVolumeIcon(savedVolume);
                }

                volumeControl.oninput = function() {
                    ipcRenderer.send('music-command', { action: 'volume', value: parseFloat(this.value) });
                    // 🔴 CORRETTO: Sincronizzato con il file di Background Musica.js
                    localStorage.setItem('saved_music_volume', this.value); 
                    updateVolumeIcon(this.value);
                };
            }

            // BARRA CARICAMENTO / TIMELINE AVANZAMENTO
            const trackProgress = document.getElementById('track-progress');
            if (trackProgress) {
                // Quando l'utente trascina la timeline col mouse
                trackProgress.oninput = function() {
                    isSeeking = true;
                };
                // Quando rilascia il click, applica lo spostamento effettivo nel tempo del player
                trackProgress.onchange = function() {
                    ipcRenderer.send('music-command', { action: 'seek', value: this.value });
                    isSeeking = false;
                };
            }

            // --- APERTURA FINESTRA MODALE MODIFICA ---
            const editLibBtn = document.getElementById('edit-library-btn');
            if (editLibBtn) {
                editLibBtn.onclick = function() {
                    document.getElementById('edit-music-modal').style.display = 'flex';
                    document.getElementById('edit-step-1').style.display = 'flex';
                    document.getElementById('edit-step-2').style.display = 'none';
                    document.getElementById('edit-confirm-btn').style.display = 'none';
                    document.getElementById('edit-modal-title').innerText = "Cosa vuoi modificare?";
                    document.getElementById('edit-modal-desc').style.display = 'block';
                };
            }

            // --- CONFERMA FINALE DELLA MODIFICA / RIMOZIONE SU DB ---
            const confirmEditBtn = document.getElementById('edit-confirm-btn');
            if (confirmEditBtn) {
                confirmEditBtn.onclick = async function() {
                    const select = document.getElementById('edit-track-select');
                    const idToModify = parseInt(select.value);
                    if (isNaN(idToModify)) return;

                    if (activeEditAction === 'remove') {
                        await executeRemoveTrack(idToModify);
                    } else if (activeEditAction === 'name') {
                        const newName = document.getElementById('edit-new-name').value.trim();
                        if (!newName) { showMusicAlert("Inserisci un nome valido!", true); return; }
                        await executeUpdateTrackField(idToModify, { title: newName });
                    } else if (activeEditAction === 'cover') {
                        const newCoverFile = document.getElementById('edit-new-cover').files[0];
                        if (!newCoverFile) { showMusicAlert("Seleziona un file immagine!", true); return; }
                        await executeUpdateTrackField(idToModify, { coverBlob: newCoverFile });
                    }
                    closeEditModal();
                };
            }
        }

        // Funzione globale di supporto per aggiornare visivamente l'icona del volume
        function updateVolumeIcon(value) {
            const volumeIcon = document.getElementById('volume-icon');
            if (volumeIcon) {
                if (value == 0) volumeIcon.innerText = "🔇";
                else if (value < 0.4) volumeIcon.innerText = "🔈";
                else if (value < 0.7) volumeIcon.innerText = "🔉";
                else volumeIcon.innerText = "🔊";
            }
        }

        // --- SISTEMA INTERATTIVO DI MODIFICA PASSO-PASSO ---
        window.setEditAction = function(action) {
            activeEditAction = action;
            document.getElementById('edit-step-1').style.display = 'none';
            document.getElementById('edit-step-2').style.display = 'flex';
            document.getElementById('edit-modal-desc').style.display = 'none';
            
            // Popola il menu a tendina con i brani correnti mantenendo l'ID univoco di IndexedDB
            const select = document.getElementById('edit-track-select');
            select.innerHTML = '';
            playlist.forEach(track => {
                select.innerHTML += `<option value="${track.id}">${track.title}</option>`;
            });

            document.getElementById('container-edit-name').style.display = action === 'name' ? 'flex' : 'none';
            document.getElementById('container-edit-cover').style.display = action === 'cover' ? 'flex' : 'none';
            document.getElementById('edit-new-name').value = '';
            document.getElementById('edit-new-cover').value = '';

            const confirmBtn = document.getElementById('edit-confirm-btn');
            confirmBtn.style.display = 'block';
            
            if (action === 'remove') {
                document.getElementById('edit-modal-title').innerText = "Rimuovi un brano";
                confirmBtn.innerText = "Rimuovi Ora";
                confirmBtn.style.background = '#ed4245';
                confirmBtn.style.color = 'white';
            } else if (action === 'name') {
                document.getElementById('edit-modal-title').innerText = "Rinomina il brano";
                confirmBtn.innerText = "Salva Nome";
                confirmBtn.style.background = 'white';
                confirmBtn.style.color = 'black';
            } else {
                document.getElementById('edit-modal-title').innerText = "Cambia Copertina";
                confirmBtn.innerText = "Salva Immagine";
                confirmBtn.style.background = 'white';
                confirmBtn.style.color = 'black';
            }
        };

        window.closeEditModal = function() {
            document.getElementById('edit-music-modal').style.display = 'none';
        };

        // Esegue l'eliminazione fisica del record su IndexedDB
        // Esegue l'eliminazione fisica del record su IndexedDB
        function executeRemoveTrack(id) {
            return new Promise((resolve) => {
                const transaction = db.transaction(["tracks"], "readwrite");
                const store = transaction.objectStore("tracks");
                store.delete(id);

                transaction.oncomplete = async () => {
                    showMusicAlert("Brano rimosso con successo dalla libreria!");
                    // 🌟 PRIMA aggiorna la lista locale della pagina...
                    await refreshPlaylistData();
                    // 🌟 POI notifica il background (così la UI è già pronta quando riceve la risposta)
                    ipcRenderer.send('music-command', { action: 'reload-db' });
                    resolve();
                };
            });
        }

        // Estrae il record, unisce i campi modificati e aggiorna l'object store
        function executeUpdateTrackField(id, updatedFields) {
            return new Promise((resolve) => {
                const transaction = db.transaction(["tracks"], "readwrite");
                const store = transaction.objectStore("tracks");
                const getRequest = store.get(id);
                
                getRequest.onsuccess = () => {
                    const currentData = getRequest.result;
                    if (!currentData) return;
                    
                    const mergedData = Object.assign(currentData, updatedFields);
                    store.put(mergedData);
                };

                transaction.oncomplete = async () => {
                    showMusicAlert("Libreria aggiornata con successo!");
                    // 🌟 Stessa cosa qui: aggiorna prima la UI locale
                    await refreshPlaylistData();
                    // 🌟 E poi notifica il riproduttore audio di background
                    ipcRenderer.send('music-command', { action: 'reload-db' });
                    resolve();
                };
            });
        }

        // --- SVUOTA LA VECCHIA CODA ED ESTRAE LE TRACCE DA INDEXEDDB ---
        async function refreshPlaylistData() {
            try {
                const rawTracks = await loadTracksFromDB();
                
                playlist.forEach(t => {
                    if(t.audioSrc) URL.revokeObjectURL(t.audioSrc);
                    if(t.coverSrc && !t.coverSrc.startsWith('http')) URL.revokeObjectURL(t.coverSrc);
                });

                playlist = rawTracks.map(track => {
                    return {
                        id: track.id, 
                        title: track.title,
                        audioSrc: URL.createObjectURL(track.audioBlob),
                        coverSrc: track.coverBlob ? URL.createObjectURL(track.coverBlob) : 'https://placehold.co/150x150/ffffff/000000?text=Audio'
                    };
                });

                renderPlaylist();
            } catch (err) {
                console.error("Errore nel caricamento della playlist:", err);
            }
        }

        // Genera la lista delle tracce a schermo
        function renderPlaylist(activeTitle = '') {
            const container = document.getElementById('playlist-container');
            const emptyMsg = document.getElementById('empty-playlist-msg');
            const playerContainer = document.getElementById('player-container');

            if (!container) return;

            if (playlist.length > 0) {
                if (emptyMsg) emptyMsg.style.display = 'none';
                if (playerContainer) playerContainer.style.display = 'flex';
                
                container.innerHTML = '';
                playlist.forEach((track, index) => {
                    const trackRow = document.createElement('div');
                    const isActive = track.title === activeTitle;
                    
                    trackRow.style = `display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,${isActive ? '0.12' : '0.03'}); border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid ${isActive ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.02)'};`;
                    
                    trackRow.onmouseover = () => { if(!isActive) trackRow.style.background = 'rgba(255,255,255,0.07)'; };
                    trackRow.onmouseout = () => { if(!isActive) trackRow.style.background = 'rgba(255,255,255,0.03)'; };
                    
                    trackRow.onclick = () => { 
                        ipcRenderer.send('music-command', { action: 'seek-index', index: index }); 
                    };
                    
                    trackRow.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <img src="${track.coverSrc}" style="width: 40px; height: 40px; border-radius: 6px; object-fit: cover;">
                            <span style="font-weight: ${isActive ? '600' : '400'}; color: ${isActive ? '#fff' : 'rgba(255,255,255,0.9)'}; font-size: 14px;">${track.title}</span>
                        </div>
                        ${isActive ? '<span style="color:#57f287; font-size:12px; font-weight:600;">In riproduzione</span>' : ''}
                    `;
                    container.appendChild(trackRow);
                });
            } else {
                if (emptyMsg) emptyMsg.style.display = 'block';
                if (playerContainer) playerContainer.style.display = 'none';
            }
        }

        // --- ASCOLTATORE DI SINCRONIZZAZIONE GLOBALE DAL BACKGROUND IN CODA ---
        ipcRenderer.on('sync-ui-status', (event, data) => {
            if (data.type === 'timeupdate') {
                const trackProgress = document.getElementById('track-progress');
                const currentTimeLabel = document.getElementById('current-time');
                const totalDurationLabel = document.getElementById('total-duration');
                
                function formatTime(seconds) {
                    if (isNaN(seconds)) return "0:00";
                    const mins = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                }

                if (trackProgress && !isSeeking) {
                    trackProgress.max = Math.floor(data.duration);
                    trackProgress.value = Math.floor(data.currentTime);
                }
                if (currentTimeLabel && !isSeeking) currentTimeLabel.innerText = formatTime(data.currentTime);
                if (totalDurationLabel) totalDurationLabel.innerText = formatTime(data.duration);
            }
            
            if (data.type === 'trackchange') {
                if(document.getElementById('player-title')) document.getElementById('player-title').innerText = data.title;
                if(document.getElementById('player-cover')) document.getElementById('player-cover').src = data.coverSrc;
                if(document.getElementById('btn-play-pause')) document.getElementById('btn-play-pause').innerText = data.paused ? '▶' : '⏸';
                if(document.getElementById('player-status')) document.getElementById('player-status').innerText = data.paused ? 'In pausa' : 'In riproduzione';
                
                renderPlaylist(data.title);
            }
        });

        // --- APERTURA TAB ASINCRONA ---
        async function switchTab(tabName, filePath = null) {
            if (filePath) {
                try {
                    const response = await fetch(filePath);
                    if (response.ok) {
                        let htmlContent = await response.text();
                        document.getElementById(`tab-${tabName}`).innerHTML = htmlContent;
                        
                        if(tabName === 'musica') {
                            initMusicListeners();
                            await refreshPlaylistData();
                            
                            // Richiede uno stato immediato per popolare i campi grafici se la musica stava già girando
                            ipcRenderer.send('music-command', { action: 'request-sync' });

                            // Forza il riallineamento grafico della levetta del volume appena caricato il modulo HTML
                            const volumeControl = document.getElementById('volume-control');
                            // 🔴 CORRETTO: Letto dalla chiave corretta
                            const savedVolume = localStorage.getItem('saved_music_volume');
                            if (volumeControl && savedVolume !== null) {
                                volumeControl.value = savedVolume;
                                updateVolumeIcon(savedVolume);
                            }
                        }
                    } else {
                        document.getElementById(`tab-${tabName}`).innerHTML = `<p style="color:red; padding:20px;">Errore nel caricamento del modulo: ${response.statusText}</p>`;
                    }
                } catch (error) {
                    document.getElementById(`tab-${tabName}`).innerHTML = `<p style="color:red; padding:20px;">Errore di rete durante il caricamento di ${filePath}.</p>`;
                }
            }

            const items = document.querySelectorAll('.nav-item');
            items.forEach(el => el.classList.remove('active'));
            
            const activeMenu = document.getElementById(`menu-${tabName}`);
            if(activeMenu) activeMenu.classList.add('active');
        }

        // Modali Logout
        function logout() { document.getElementById('logout-modal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
        function confirmLogout() { localStorage.removeItem('user_logged_in'); window.location.href = 'Account.html'; }

        // Caricamento Iniziale del DOM
        document.addEventListener('DOMContentLoaded', async () => {
            const globalUsername = localStorage.getItem('global_active_username') || 'Nome Utente';
            const globalAvatar = localStorage.getItem('global_active_avatar') || 'Images/acrox_profile.png';
            document.getElementById('sidebar-username').innerText = globalUsername;
            document.getElementById('sidebar-avatar').src = globalAvatar;

            try {
                await initDB();
            } catch(e) {
                console.error(e);
            }

            // CONTROLLO DEL PARAMETRO URL PER IL TAB
            const urlParams = new URLSearchParams(window.location.search);
            const tabParam = urlParams.get('tab');

            if (tabParam === 'musica') {
                switchTab('musica', 'Files/Musica.txt');
            } else {
                switchTab('musica', 'Files/Musica.txt');
            }
        });

        window.addEventListener('storage', (e) => {
            if(e.key === 'global_active_username' || e.key === 'global_active_avatar') location.reload();
        });
    </script>
</body>
</html>
